<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0c08">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<title>Primed — Gym Workout Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='15' fill='%230a0c08'/><g fill='none' stroke='%23c9ff2e' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'><path d='M21 46 L32 38 L43 46' opacity='.5'/><path d='M21 37 L32 29 L43 37' opacity='.78'/><path d='M21 28 L32 20 L43 28'/></g></svg>">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Primed">
<style>
:root{
  --bg:#0a0c08; --card:#13180e; --card2:#1d2513; --line:#27301a;
  --text:#f0f7e9; --mut:#84907a;
  --acc:#c9ff2e; --acc2:#a9e019; --accSoft:rgba(201,255,46,.13); --accText:#1a2403;
  --green:#3ddc84; --greenSoft:rgba(61,220,132,.12);
  --red:#ff5e5e; --amber:#ffb020; --purple:#b18cff; --gold:#f5c044;
  --shadow:0 10px 30px rgba(0,0,0,.45);
  --glow:0 0 18px rgba(201,255,46,.30);
  --grad:linear-gradient(145deg,#e2ff5e,#469400);
  --gradText:#16240a;
  color-scheme:dark;
}
[data-theme="light"]{
  --bg:#f7f4f0; --card:#ffffff; --card2:#f0eae3; --line:#e8e1d8;
  --text:#1d1611; --mut:#7a7068;
  --acc:#d23a1a; --acc2:#b22e12; --accSoft:rgba(210,58,26,.10); --accText:#ffffff;
  --greenSoft:rgba(46,204,113,.14);
  --shadow:0 10px 30px rgba(80,35,15,.10);
  --glow:0 0 0 rgba(0,0,0,0);
  --grad:linear-gradient(140deg,#ef6a33,#c1280f);
  --gradText:#ffffff;
  color-scheme:light;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
button,input,select,textarea{touch-action:manipulation}
html,body{margin:0;padding:0;background:#000}
[data-theme="light"] body{background:#d9dde6}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text)}
#app{position:relative;max-width:430px;height:100dvh;margin:0 auto;background:var(--bg);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5);padding-top:env(safe-area-inset-top)}
@media (min-width:480px){
  body{display:flex;align-items:center;justify-content:center;min-height:100dvh;background:radial-gradient(1000px 700px at 50% -5%,#1b2410 0%,#040503 70%)}
  [data-theme="light"] body{background:radial-gradient(1000px 700px at 50% -5%,#ffffff 0%,#ddcfc2 70%)}
  #app{width:430px;height:calc(100dvh - 56px);max-height:940px;border-radius:34px;border:1px solid var(--line);box-shadow:0 30px 90px rgba(0,0,0,.55)}
  [data-theme="light"] #app{box-shadow:0 30px 90px rgba(75,35,12,.16)}
}
#screen{flex:1;overflow-y:auto;overscroll-behavior:contain;padding-bottom:calc(95px + env(safe-area-inset-bottom)/2)}
#screen,.ovbody,.sheetbody{scrollbar-width:none}
#screen::-webkit-scrollbar,.ovbody::-webkit-scrollbar,.sheetbody::-webkit-scrollbar{width:0;height:0}
.scr{padding:22px 18px 10px}
.h1{font-size:27px;font-weight:800;margin:2px 0 2px;letter-spacing:-.5px}
.sub{color:var(--mut);font-size:13px;margin-bottom:16px;line-height:1.5}
.sec{font-size:13px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin:28px 0 10px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
.card.tap{cursor:pointer}
.card.tap:active{transform:scale(.99)}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;border:none;border-radius:14px;padding:13px 16px;font-size:15px;font-weight:800;cursor:pointer;background:var(--acc);color:var(--accText);font-family:inherit;box-shadow:var(--glow)}
.btn:active{background:var(--acc2)}
.btn svg{width:18px;height:18px;flex:none}
.btn.ghost{background:var(--card2);color:var(--text)}
.btn.soft{background:var(--accSoft);color:var(--acc)}
.btn.danger{background:transparent;color:var(--red)}
.btn.ghost,.btn.soft,.btn.danger{box-shadow:none}
.btn.small{width:auto;padding:10px 16px;font-size:13px;border-radius:11px}
.iconbtn{background:var(--card2);border:none;color:var(--text);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex:none}
.stat{flex:1;text-align:center}
.stat b{display:block;font-size:19px;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums;white-space:nowrap}
.stat span{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}
.dlt{display:block;font-size:11px;font-weight:800;margin-top:4px;color:var(--mut)}
.dlt.up{color:var(--green)}
.dlt.dn{color:var(--red)}
.dd{width:34px;height:34px;border-radius:50%;background:var(--card2);color:var(--mut);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none}
.dd.on{background:var(--acc);color:var(--accText)}
.dd.today{box-shadow:0 0 0 2px var(--acc) inset}
.seclink{float:right;color:var(--acc);cursor:pointer;text-transform:none;letter-spacing:0;font-size:13px}
.qa{display:flex;align-items:center;gap:12px;padding:13px 0;border-top:1px solid var(--line);cursor:pointer}
.qa:active{opacity:.7}
.qi{width:42px;height:42px;background:var(--accSoft);color:var(--acc);border-radius:13px;display:flex;align-items:center;justify-content:center;flex:none}
.qi svg{width:20px;height:20px}
.iconbtn svg{width:17px;height:17px}
.empty .big svg{width:42px;height:42px;color:var(--mut)}
.empty .big{line-height:0}
.prbadge svg{width:11px;height:11px;vertical-align:-1.5px;margin-right:3px}
.menuitem .ic svg{width:18px;height:18px;vertical-align:-3px}
.donebtn svg{width:15px;height:15px}
.checkbox svg{width:13px;height:13px}
.dd svg{width:13px;height:13px}
.sethead svg{width:12px;height:12px;opacity:.7}
.chip svg{width:14px;height:14px;vertical-align:-2px;margin-right:4px}
.xs svg{width:12px;height:12px;vertical-align:-1px}
.goldic{color:var(--gold)}
#banner svg{width:15px;height:15px}
.avgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:2px}
.avbtn{height:40px;border:none;border-radius:12px;background:var(--card2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.avbtn.on{box-shadow:0 0 0 2px var(--acc)}
.gswatch{width:100%;aspect-ratio:1;border-radius:50%;border:1px solid var(--line);cursor:pointer}
.gswatch.on{box-shadow:0 0 0 2.5px var(--card),0 0 0 5px var(--acc)}
.seg{display:flex;background:var(--card2);border-radius:13px;padding:4px;gap:4px;margin:0 0 18px}
.seg button{flex:1;border:none;background:transparent;color:var(--mut);font-weight:700;font-size:13px;padding:10px 4px;border-radius:10px;cursor:pointer;font-family:inherit}
.seg button.on{background:var(--acc);color:var(--accText)}
.frow{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:56px;padding:7px 0;border-bottom:1px solid var(--line)}
.frow:last-child{border-bottom:none}
.frow .fl{font-size:15px;font-weight:600;color:var(--text)}
.frow .fl small{display:block;font-size:12px;font-weight:400;color:var(--mut);margin-top:1px}
.frow .ctl,.kvrow .ctl{width:150px;flex:none;height:42px;padding:0 12px;font-size:15px;font-family:inherit;color:var(--text)}
.frow input.ctl,.frow select.ctl{background:var(--card2);border:1px solid var(--line);border-radius:10px;outline:none}
.frow input.ctl:focus{border-color:var(--acc)}
.frow select.ctl,.kvrow select.ctl{text-align:left;text-align-last:left}
.frow input.ctl,.frow input.ctl::placeholder{text-align:left}
.frow button.ctl,.kvrow button.ctl{display:flex;align-items:center;justify-content:flex-start}
.avchg{display:flex;align-items:center;gap:10px;flex:none;cursor:pointer}
.avchg .chev{color:var(--mut);font-size:14px;font-weight:600;white-space:nowrap}
.rdhero{display:flex;align-items:center;gap:16px}
.infobtn{width:30px;height:30px;border:none;background:none;color:var(--mut);cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;padding:0}
.infobtn:active{color:var(--acc)}
.infobtn svg{width:18px;height:18px}
.rdinfo{position:absolute;top:10px;right:10px;z-index:2}
.rdmrow{display:flex;align-items:center;gap:10px;padding:9px 0}
.rdmrow .nm{font-weight:600;font-size:14px}
.rdmrow .ds{font-size:12px;color:var(--mut);margin-top:1px}
.rdmbar{width:58px;flex:none;height:6px;background:var(--card2);border-radius:99px;overflow:hidden}
.rdmbar i{display:block;height:100%;background:var(--acc);border-radius:99px}
.rdband{display:inline-block;font-size:12px;font-weight:800;border-radius:999px;padding:3px 11px;letter-spacing:.02em}
.rdadvice{font-size:13px;color:var(--mut);line-height:1.45;margin-top:6px}
.rdchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.rdchip{font-size:11px;font-weight:700;color:var(--mut);background:var(--card2);border-radius:999px;padding:3px 9px}
.rng{width:100%;accent-color:var(--acc);height:26px;margin:0}
.rngends{display:flex;justify-content:space-between;font-size:11px;color:var(--mut);margin:-4px 0 2px}
.fbar{display:flex;align-items:center;gap:10px;margin:9px 0}
.fbar .fn{width:120px;font-size:13px;font-weight:600;flex:none}
.fbar .ft{flex:1;height:8px;background:var(--card2);border-radius:99px;overflow:hidden}
.fbar .ft i{display:block;height:100%;border-radius:99px}
.fbar .fv{width:34px;text-align:right;font-size:12px;color:var(--mut);flex:none}
.rdlog{display:flex;align-items:center;justify-content:space-between;font-size:14px;padding:11px 2px;border-bottom:1px solid var(--line)}
.rdlog:last-child{border-bottom:none}
.rdscore{font-weight:800;font-variant-numeric:tabular-nums;border-radius:8px;padding:2px 9px;font-size:13px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none;background:var(--card2);color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--accSoft);color:var(--acc);border-color:var(--acc)}
.search{width:100%;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:16px;color:var(--text);outline:none;margin-bottom:10px;font-family:inherit}
.search:focus{border-color:var(--acc)}
.exrow{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.exrow:last-child{border-bottom:none}
.avatar{width:42px;height:42px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:var(--acc);flex:none}
.exname{font-weight:700;font-size:15px}
.exmeta{font-size:12px;color:var(--mut);margin-top:1px}
.checkbox{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px}
.checkbox.on{background:var(--acc);border-color:var(--acc);color:var(--accText)}
.empty{text-align:center;color:var(--mut);padding:36px 20px}
.empty .big{font-size:40px;margin-bottom:10px}
.empty b{color:var(--text)}
/* workout feed card */
.wfc-title{font-weight:800;font-size:16px}
.wfc-date{color:var(--mut);font-size:12px;margin-top:1px}
.wfc-stats{display:flex;gap:0;margin:12px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px 0}
.wfc-ex{font-size:13px;color:var(--mut);padding:3px 0;display:flex;justify-content:space-between;gap:8px}
.wfc-ex b{color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prbadge{background:rgba(245,192,68,.15);color:var(--gold);font-size:11px;font-weight:700;border-radius:999px;padding:2px 8px;flex:none}
/* set grid */
.sethead,.setrow{display:grid;gap:8px;align-items:center;padding:4px 0}
.cols-wr{grid-template-columns:38px 1fr 64px 64px 40px}
.cols-r{grid-template-columns:38px 1fr 96px 40px}
.cols-t{grid-template-columns:38px 1fr 96px 40px}
.cols-wr-n,.cols-r-n,.cols-t-n{ } /* routine mode: same minus check col */
.cols-wr-n{grid-template-columns:38px 1fr 64px 64px 26px}
.cols-r-n{grid-template-columns:38px 1fr 96px 26px}
.cols-t-n{grid-template-columns:38px 1fr 96px 26px}
.sethead{font-size:11px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.04em;text-align:center}
.sethead :first-child{text-align:center}
.setrow{border-radius:10px;padding:5px 0}
.setrow.done{background:var(--greenSoft)}
.stype{border:none;background:transparent;color:var(--text);font-weight:800;font-size:14px;cursor:pointer;height:34px;border-radius:9px;font-family:inherit}
.stype.W{color:var(--amber)} .stype.F{color:var(--red)} .stype.D{color:var(--purple)}
.prev{font-size:12px;color:var(--mut);text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.nin{width:100%;background:var(--card2);border:1.5px solid transparent;border-radius:9px;height:36px;text-align:center;font-size:16px;font-weight:700;color:var(--text);outline:none;font-family:inherit;padding:0 2px}
.nin:focus{border-color:var(--acc)}
.nin.bad{border-color:var(--red);animation:shake .25s}
.setrow.done .nin{background:transparent}
@keyframes shake{25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.donebtn{width:34px;height:34px;border-radius:9px;border:none;background:var(--card2);color:var(--mut);font-size:15px;cursor:pointer;justify-self:center}
.donebtn.on{background:var(--green);color:#06301b}
.addset{background:var(--card2);border:none;color:var(--text);width:100%;border-radius:10px;padding:9px;font-weight:700;font-size:13px;cursor:pointer;margin-top:8px;font-family:inherit}
.exhead{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.exhead .t{color:var(--acc);font-weight:800;font-size:15px;cursor:pointer}
/* drag-to-reorder exercises */
.exgrip{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;color:var(--mut);cursor:grab;touch-action:none;flex:none}
.exgrip svg{width:20px;height:20px}
.exblock.dragging{position:relative;z-index:50;opacity:.96;box-shadow:0 16px 36px rgba(0,0,0,.45);cursor:grabbing}
.dropline{height:3px;background:var(--acc);border-radius:3px;margin:4px 6px 16px}
/* while reordering, collapse blocks to short header rows so they're easy to drag */
.exlist.reordering .exblock{padding:12px 16px;margin-bottom:8px}
.exlist.reordering .exblock .exhead{margin-bottom:0}
.exlist.reordering .exblock .sethead,.exlist.reordering .exblock .setwrap,.exlist.reordering .exblock .setrow,.exlist.reordering .exblock .addset,.exlist.reordering .exblock .exnote{display:none}
/* superset: connect grouped exercise cards with a shared accent rail */
.exblock.ss{border-left:3px solid var(--acc)}
.exblock.ss-top{border-bottom-left-radius:0;border-bottom-right-radius:0;margin-bottom:2px}
.exblock.ss-mid{border-radius:0;margin-top:0;margin-bottom:2px;border-top:1px solid var(--line)}
.exblock.ss-bot{border-top-left-radius:0;border-top-right-radius:0;margin-top:0;border-top:1px solid var(--line)}
.sstag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--acc);margin-bottom:10px}
.sstag svg{width:14px;height:14px}
.exlink{color:var(--mut)}
.exlink.on{color:var(--acc)}
/* swipe-a-set-left-to-delete */
.setwrap{position:relative;overflow:hidden}
.setwrap .setdel{position:absolute;top:3px;right:0;bottom:3px;width:64px;display:flex;align-items:center;justify-content:center;background:var(--red);color:#fff;border:none;border-radius:10px;cursor:pointer}
.setwrap .setdel svg{width:20px;height:20px}
.setwrap .setrow{position:relative;z-index:1;background:var(--card);transition:transform .18s cubic-bezier(.32,.72,.25,1);touch-action:pan-y}
.setwrap .setrow.done{background:linear-gradient(0deg,var(--greenSoft),var(--greenSoft)),var(--card)}
.setwrap.open .setrow{transform:translateX(-64px)}
.exnote{font-size:12px;color:var(--mut);font-style:italic;margin:-2px 0 8px 44px}
.tagchip{background:var(--accSoft);color:var(--acc);font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;flex:none}
.planex{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:3px 0;color:var(--mut)}
.planex b{color:var(--text);font-weight:600}
/* overlay (active workout) */
#overlay{position:absolute;inset:0;background:var(--bg);z-index:30;display:flex;flex-direction:column;transform:translateY(105%);transition:transform .28s cubic-bezier(.32,.72,.25,1)}
#overlay.open{transform:translateY(0)}
.ovhead{padding:calc(14px + env(safe-area-inset-top)) 16px 10px;border-bottom:1px solid var(--line);background:var(--card)}
.ovbody{flex:1;overflow-y:auto;padding:14px 16px 120px}
.woclock{font-variant-numeric:tabular-nums;font-weight:800;font-size:18px;color:var(--acc)}
.woname{background:transparent;border:none;outline:none;color:var(--text);font-size:20px;font-weight:800;width:100%;font-family:inherit;padding:0;margin:8px 0 2px}
.wostats{display:flex;gap:18px;color:var(--mut);font-size:13px}
.wostats b{color:var(--text)}
/* tab bar */
#tabbar{position:absolute;bottom:calc(7px + env(safe-area-inset-bottom)/2);left:16px;right:16px;height:62px;background:var(--card);border:1px solid var(--line);border-radius:22px;display:grid;grid-template-columns:repeat(5,1fr);z-index:20;box-shadow:var(--shadow)}
.tab{border:none;background:none;color:var(--mut);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-family:inherit;position:relative}
.tab.on{color:var(--acc)}
.tab svg{width:23px;height:23px}
.tab .adot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:0;transition:opacity .2s ease}
.tab.on .adot{opacity:1}
.tab .plus{width:48px;height:48px;border-radius:16px;background:var(--acc);display:flex;align-items:center;justify-content:center;color:var(--accText);box-shadow:var(--glow);transition:transform .15s ease}
.tab .plus:active{transform:scale(.92)}
.tab .plus svg{width:25px;height:25px}
/* banner */
#banner{position:absolute;left:16px;right:16px;bottom:calc(79px + env(safe-area-inset-bottom)/2);background:var(--green);color:#06301b;border-radius:16px;padding:11px 14px;display:none;align-items:center;gap:10px;z-index:21;cursor:pointer;box-shadow:var(--shadow)}
#banner b{font-variant-numeric:tabular-nums}
/* rest pill */
#rest{position:absolute;left:50%;transform:translateX(-50%);bottom:calc(81px + env(safe-area-inset-bottom)/2);background:var(--card2);border:1px solid var(--acc);color:var(--text);border-radius:999px;padding:8px 10px 8px 16px;display:none;align-items:center;gap:10px;z-index:40;box-shadow:var(--shadow),var(--glow)}
#rest b{font-variant-numeric:tabular-nums;font-size:17px;color:var(--acc)}
#rest button{border:none;border-radius:999px;padding:7px 12px;font-weight:700;cursor:pointer;font-size:12px;background:var(--card);color:var(--text);border:1px solid var(--line);font-family:inherit}
/* sheet */
#modal{position:absolute;inset:0;z-index:50;display:none}
#modal.open{display:block}
.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55)}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--card);border-radius:20px 20px 0 0;padding:16px;max-height:86%;display:flex;flex-direction:column;animation:up .22s ease-out}
@keyframes up{from{transform:translateY(40px);opacity:.5}to{transform:translateY(0);opacity:1}}
.sheet h3{margin:0 0 12px;font-size:17px}
.sheetbody{overflow-y:auto;flex:1}

.lnline{fill:none;stroke:var(--acc);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.lndot{fill:var(--acc)}
.lnlbl{fill:var(--mut);font-size:9px;text-anchor:middle}

.backrow{display:flex;align-items:center;gap:8px;padding:12px 10px 8px;position:sticky;top:0;background:var(--bg);z-index:6;border-bottom:1px solid transparent}
.backbtn{background:none;border:none;color:var(--acc);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit;padding:6px}
.rec{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rec .card{margin:0}
.rec b{font-size:21px;font-weight:800;display:block;margin-top:2px;color:var(--acc);font-variant-numeric:tabular-nums}
.rec span{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.04em}
.hl{color:var(--acc)}
.monthhead{font-size:13px;font-weight:800;color:var(--mut);margin:18px 0 8px;text-transform:uppercase;letter-spacing:.05em}
.setline{display:flex;justify-content:space-between;font-size:14px;padding:4px 0;color:var(--mut)}

.pillrow{display:flex;gap:8px;flex-wrap:wrap}

.kpi .ks{font-size:11px;font-weight:600;color:var(--mut)}
.dchip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px;background:rgba(255,255,255,.22);color:var(--gradText)}

.dcardtitle{font-weight:800;font-size:15px}
.dbars{display:flex;align-items:flex-end;gap:10px;height:154px}
.dbcol{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;min-width:0}
.dbtrack{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center;min-height:0}
.dbar{width:100%;max-width:26px;background:var(--grad);border-radius:6px 6px 0 0;min-height:3px}
.dblab{font-size:11px;color:var(--mut);margin-top:9px;flex:none;white-space:nowrap}
.dtable{width:100%;border-collapse:collapse;table-layout:fixed}
.dth{font-size:11px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.04em;text-align:left;padding:9px 8px;border-bottom:1px solid var(--line)}
.dth.r,.dtd.r{text-align:right}
.dtd{font-size:13px;padding:12px 8px;border-bottom:1px solid var(--line);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dtd.mut{color:var(--mut)}
.drow{cursor:pointer}
.drow:hover .dtd{background:var(--card2)}
.drow:last-child .dtd{border-bottom:none}
.dstat{display:inline-flex;align-items:center;font-size:12px;font-weight:600}

.exlistcard{max-height:600px;overflow-y:auto}

.exright{padding:18px 20px;min-width:0}

.exfilters{display:flex;gap:10px;margin-bottom:12px}

#app.authing #tabbar,#app.authing #banner,#app.authing #rest,#app.authing #overlay{display:none!important}

.auth{min-height:100%;display:flex;align-items:center;justify-content:center;padding:28px 22px}
.authcard{width:100%;max-width:360px;text-align:center}
.authlogo{width:60px;height:60px;border-radius:17px;background:linear-gradient(180deg,#181f0e,#0a0c08);color:var(--acc);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:var(--glow)}
.authlogo svg{width:32px;height:32px}
.authname{font-size:26px;font-weight:800;letter-spacing:-.5px}
.authtag{font-size:14px;color:var(--mut);margin:4px 0 22px;line-height:1.5}

.autherr.show{display:block}
.authguest{color:var(--acc);font-weight:700;font-size:14px;margin-top:18px;cursor:pointer}
.authnote{font-size:12px;color:var(--mut);margin-top:18px;line-height:1.5}

.obprog span{width:34px;height:4px;border-radius:2px;background:var(--card2)}

.obopt b{font-size:16px}

.obopt .grow{min-width:0}
.obcheck{flex:none;opacity:0;color:var(--acc)}

.tablbl,.navbrand,.navonly{display:none}
#tabbar.navhide{display:none}
@media (min-width:740px){
  #app{width:min(760px,94vw);max-width:760px;max-height:1060px}

}
@media (min-width:1080px){

  #screen{padding-bottom:32px}
  #screen .scr{max-width:720px;margin:0 auto;padding:32px 32px 48px}
  #screen .scr.dash{max-width:1340px;padding:30px 34px 54px}
  #tabbar,#tabbar.navhide{position:static;inset:auto;order:-1;width:250px;flex:none;height:auto;display:flex;flex-direction:column;align-items:stretch;gap:3px;padding:22px 16px;border:none;border-right:1px solid var(--line);border-radius:0;box-shadow:none;background:var(--card)}
  #tabbar .navbrand{display:flex;align-items:center;gap:11px;padding:4px 12px 22px;font-weight:800;font-size:20px;letter-spacing:-.3px;color:var(--text);order:0}
  #tabbar .navbrand .navlogo{width:36px;height:36px;border-radius:11px;background:linear-gradient(180deg,#181f0e,#0a0c08);color:var(--acc);display:flex;align-items:center;justify-content:center;flex:none}
  #tabbar .navbrand .navlogo svg{width:21px;height:21px}
  #tabbar .tab{flex-direction:row;justify-content:flex-start;gap:13px;height:46px;padding:0 13px;border-radius:11px;color:var(--mut);position:relative;transition:background .15s ease,color .15s ease}
  #tabbar .tab svg{width:22px;height:22px;transition:transform .15s ease}
  #tabbar .tab .tablbl{display:inline;font-size:15px;font-weight:600}
  #tabbar .tab .adot{display:none}
  #tabbar .tab:hover{background:var(--card2);color:var(--text)}
  #tabbar .tab:hover svg{transform:scale(1.08)}
  #tabbar .tab.on{background:var(--accSoft);color:var(--acc)}
  #tabbar .tab.on .tablbl{font-weight:800}
  #tabbar .tab-home,#tabbar .tab-history,#tabbar .tab-exercises{order:2}
  #tabbar .tab-profile{order:8;margin-top:auto}
  #tabbar .navonly{display:flex;order:9}
  #tabbar .tabplus{order:1;margin-bottom:14px;height:46px;flex-direction:row;justify-content:flex-start;gap:13px;padding:0 13px;border-radius:11px;background:var(--acc);color:var(--accText);transition:background .15s ease,transform .12s ease}
  #tabbar .tabplus:hover{background:var(--acc2)}
  #tabbar .tabplus:active{transform:scale(.97)}
  #tabbar .tabplus .plus{width:22px;height:22px;background:none;box-shadow:none;border-radius:0;color:var(--accText);padding:0;flex:none}
  #tabbar .tabplus .plus svg{width:22px;height:22px}
  #tabbar .tabplus .tablbl{display:inline;color:var(--accText);font-size:15px;font-weight:800}
  #banner{left:auto;right:30px;bottom:24px;max-width:340px}
  #rest{left:auto;right:30px;transform:none;bottom:24px}
  .sheet{animation:none;left:50%;right:auto;transform:translateX(-50%);width:480px;max-width:92%;border-radius:20px}
}
@media (display-mode:standalone) and (max-width:1079px){
  body{background:var(--bg)!important}
  #app{width:100%;max-width:none;height:100dvh;max-height:none;border-radius:0;border:none;box-shadow:none}
}

function exAll(){return BUILTIN.concat(S.customExercises);}
function exDef(id){var a=exAll();for(var i=0;i<a.length;i++)if(a[i].id===id)return a[i];return {id:id,name:'Unknown',muscle:'Other',equip:'Other',type:'wr'};}
function unitLbl(){return S.unit;}
function dispW(kg){ if(kg==null||kg==='')return ''; var v=S.unit==='lb'?kg*2.20462:kg; v=Math.round(v*10)/10; return String(v); }
function toKg(v){ if(v==null||v==='')return null; var n=parseFloat(String(v).replace(',','.')); if(isNaN(n))return null; return S.unit==='lb'?n/2.20462:n; }
function epley(w,r){ w=w||0;r=r||0; if(!r)return 0; return Math.round(w*(1+r/30)*10)/10; }
function fmtDur(sec){ sec=Math.max(0,Math.round(sec)); var h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s2=sec%60;
  if(h>=10)return Math.round(sec/3600)+'h';
  if(h)return h+'h '+m+'m';
  if(m)return m+'m';
  return s2+'s'; }
function fmtClock(sec){ sec=Math.max(0,Math.round(sec)); var h=Math.floor(sec/3600),m=Math.floor(sec%3600/60),s2=sec%60;
  function p(n){return (n<10?'0':'')+n;} return h? h+':'+p(m)+':'+p(s2) : m+':'+p(s2); }
function fmtTime(sec){ if(sec==null||sec==='')return ''; return fmtClock(sec); }
function parseTime(v){ if(v==null||v==='')return null; v=String(v).trim();
  if(v.indexOf(':')>=0){ var parts=v.split(':').map(function(x){return parseInt(x,10)||0;});
    if(parts.length===3)return parts[0]*3600+parts[1]*60+parts[2]; return parts[0]*60+parts[1]; }
  var n=parseFloat(v.replace(',','.')); if(isNaN(n))return null; return Math.round(n); }
function fmtVol(kg){ var v=Math.round(S.unit==='lb'?kg*2.20462:kg), s;
  if(v>=1000000)s=(v/1000000).toFixed(2).replace(/0$/,'').replace(/\.0$/,'')+'M';
  else if(v>=100000)s=(v/1000).toFixed(0)+'k';
  else if(v>=10000)s=(v/1000).toFixed(1).replace(/\.0$/,'')+'k';
  else s=v.toLocaleString('en-US');
  return s+' '+S.unit; }
function fmtDate(iso){ var d=new Date(iso),now=new Date();
  var t0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  var d0=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  var diff=Math.round((t0-d0)/86400000);
  if(diff===0)return 'Today'; if(diff===1)return 'Yesterday';
  var names=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var s=names[d.getDay()]+', '+d.getDate()+' '+mn[d.getMonth()];
  if(d.getFullYear()!==now.getFullYear())s+=' '+d.getFullYear();
  return s; }
function monthName(iso){ var d=new Date(iso); var mn=['January','February','March','April','May','June','July','August','September','October','November','December']; return mn[d.getMonth()]+' '+d.getFullYear(); }
function monday(d){ d=new Date(d); var day=(d.getDay()+6)%7; d.setHours(0,0,0,0); d.setDate(d.getDate()-day); return d; }
function toast(msg){ var t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');},2200); }
function beep(){ try{ var C=window.AudioContext||window.webkitAudioContext; var ctx=new C();
  [0,0.22].forEach(function(off){ var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.frequency.value=880; o.type='sine';
    g.gain.setValueAtTime(0.001,ctx.currentTime+off); g.gain.exponentialRampToValueAtTime(0.25,ctx.currentTime+off+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+off+0.18);
    o.start(ctx.currentTime+off); o.stop(ctx.currentTime+off+0.2); });
  if(navigator.vibrate)navigator.vibrate([180,80,180]); }catch(e){} }

/* ================= stats helpers ================= */
function prevSets(exId){
  for(var i=S.workouts.length-1;i>=0;i--){
    var w=S.workouts[i];
    for(var j=0;j<w.exercises.length;j++) if(w.exercises[j].exId===exId) return w.exercises[j].sets;
  }
  return null;
}
function bestsBefore(exId,beforeIso){
  var b={mw:0,mrm:0,mreps:0,mtime:0};
  S.workouts.forEach(function(w){ if(beforeIso && w.start>=beforeIso)return;
    w.exercises.forEach(function(e){ if(e.exId!==exId)return;
      e.sets.forEach(function(s){ if(s.type==='W')return;
        if((s.weight||0)>b.mw)b.mw=s.weight||0;
        var rm=epley(s.weight,s.reps); if(rm>b.mrm)b.mrm=rm;
        if((s.reps||0)>b.mreps)b.mreps=s.reps||0;
        if((s.time||0)>b.mtime)b.mtime=s.time||0; }); }); });
  return b;
}
function bodyMassKg(){ return (S.bodyLog&&S.bodyLog.length)?S.bodyLog[S.bodyLog.length-1].weight:70; }
/* Per-set volume (kg tonnage). time/cardio = 0 (work is duration, tracked separately).
   Bodyweight-equipment movements use bodyweight as the load (+ any added weight) so
   push-ups, pull-ups, dips etc. register tonnage instead of 0. Loaded lifts = weight×reps. */
function setVolume(def,s){
  if(!s)return 0;
  if(def.type==='time')return 0;
  var reps=s.reps||0;
  if(def.type==='reps')return reps*bodyMassKg();
  var load=def.equip==='Bodyweight' ? bodyMassKg()+(s.weight||0) : (s.weight||0);
  return load*reps;
}
function finalizeWorkout(wo){
  wo.exercises.forEach(function(e){ e.sets=e.sets.filter(function(s){return s.done;}); });
  wo.exercises=wo.exercises.filter(function(e){return e.sets.length>0;});
  var vol=0,sc=0,prc=0;
  wo.exercises.forEach(function(e){
    var def=exDef(e.exId), b=bestsBefore(e.exId,wo.start);
    var bw=null,brm=null;
    e.sets.forEach(function(s){ sc++; vol+=setVolume(def,s); delete s.pr;
      if(s.type==='W')return;
      if(def.type==='time'){ if((s.time||0)>b.mtime && (!bw||(s.time||0)>(bw.time||0))) bw=s; }
      else if(def.type==='reps'){ if((s.reps||0)>b.mreps && (!bw||(s.reps||0)>(bw.reps||0))) bw=s; }
      else { if((s.weight||0)>b.mw && (!bw||(s.weight||0)>(bw.weight||0))) bw=s;
        var rm=epley(s.weight,s.reps);
        if(rm>b.mrm && (!brm||rm>epley(brm.weight,brm.reps))) brm=s; } });
    if(bw)bw.pr=true; if(brm)brm.pr=true;
    e.sets.forEach(function(s){ if(s.pr)prc++; });
  });
  wo.volume=vol; wo.setCount=sc; wo.prCount=prc;
  wo.dur=Math.max(1,Math.round((new Date(wo.end)-new Date(wo.start))/1000));
  return wo;
}
function bestSetLabel(e){
  var def=exDef(e.exId),best=null,bv=-1;
  e.sets.forEach(function(s){ if(s.type==='W')return; var v=def.type==='time'?(s.time||0):def.type==='reps'?(s.reps||0):epley(s.weight,s.reps);
    if(v>bv){bv=v;best=s;} });
  if(!best)return '';
  if(def.type==='time')return fmtTime(best.time||0);
  if(def.type==='reps')return (best.reps||0)+' reps';
  return dispW(best.weight||0)+' '+S.unit+' × '+(best.reps||0);
}

/* ================= charts ================= */
function barChart(vals,labels,fmt){
  var W=360,H=150,pad=20,n=vals.length,max=1;
  vals.forEach(function(v){if(v>max)max=v;});
  var bw=Math.min(26,(W-pad*2)/n*0.62), out='';
  for(var i=0;i<n;i++){
    var x=pad+(W-pad*2)*(i+0.5)/n, h=(H-52)*vals[i]/max, y=H-26-h;
    out+='<rect x="'+(x-bw/2)+'" y="'+(vals[i]?y:H-28)+'" width="'+bw+'" height="'+(vals[i]?Math.max(h,3):2)+'" rx="4" class="'+(vals[i]?'bar':'bar bar0')+'"/>';
    if(vals[i])out+='<text x="'+x+'" y="'+(y-6)+'" class="bv">'+(fmt?fmt(vals[i]):vals[i])+'</text>';
    out+='<text x="'+x+'" y="'+(H-8)+'" class="bl">'+esc(labels[i])+'</text>';
  }
  return '<svg viewBox="0 0 '+W+' '+H+'" class="chart">'+out+'</svg>';
}
function lineChart(vals,labels,fmt){
  var W=360,H=150,pad=26,n=vals.length;
  if(n===1){vals=[vals[0],vals[0]];labels=[labels[0],labels[0]];n=2;}
  var max=Math.max.apply(null,vals),min=Math.min.apply(null,vals);
  if(max===min){max+=1;min=Math.max(0,min-1);}
  var pts=[],out='';
  for(var i=0;i<n;i++){
    var x=pad+(W-pad*2)*i/(n-1), y=22+(H-58)*(1-(vals[i]-min)/(max-min));
    pts.push(x+','+y);
    out+='<circle cx="'+x+'" cy="'+y+'" r="3.5" class="lndot"/>';
    if(i===0||i===n-1||vals[i]===max) out+='<text x="'+x+'" y="'+(y-9)+'" class="lnval">'+(fmt?fmt(vals[i]):vals[i])+'</text>';
    if(n<=8||i%2===0||i===n-1) out+='<text x="'+x+'" y="'+(H-8)+'" class="lnlbl">'+esc(labels[i])+'</text>';
  }
  return '<svg viewBox="0 0 '+W+' '+H+'" class="chart"><polyline points="'+pts.join(' ')+'" class="lnline"/>'+out+'</svg>';
}

/* ================= readiness engine ================= */
function todayKey(){ return new Date().toISOString().slice(0,10); }
function rdClamp(x){ return x<0?0:x>1?1:x; }
function rdNorm(v,lo,hi){ if(v==null)return null; return rdClamp((v-lo)/(hi-lo)); }
function readinessBaseline(){
  var rhrs=[],hrvs=[];
  S.readiness.forEach(function(e){ if(e.rhr)rhrs.push(e.rhr); if(e.hrv)hrvs.push(e.hrv); });
  function med(a){ if(!a.length)return null; a=a.slice().sort(function(x,y){return x-y;}); return a[Math.floor(a.length/2)]; }
  return {rhr:med(rhrs),hrv:med(hrvs)};
}
var RD_BANDS=[
  {min:82,label:'Primed',color:'#27c46b',advice:"Your body's primed. A great day to chase a PR or add load.",cue:'good to push'},
  {min:66,label:'Ready',color:'#7bc62d',advice:"You're recovered and good to go. Train as planned.",cue:'train as planned'},
  {min:50,label:'Moderate',color:'#f5a623',advice:"Slightly under-recovered. Train, but keep it controlled — trim a set or ease the load.",cue:'keep it controlled'},
  {min:0, label:'Recover',color:'#ef4444',advice:"Recovery is low. Consider mobility, a walk, or a lighter session today.",cue:'consider a lighter day'}
];
function rdBand(score){ for(var i=0;i<RD_BANDS.length;i++) if(score>=RD_BANDS[i].min) return RD_BANDS[i]; return RD_BANDS[RD_BANDS.length-1]; }
function computeReadiness(e){
  var base=readinessBaseline(), f=[];
  var sleep01=null;
  if(e.sleepScore!=null) sleep01=rdNorm(e.sleepScore,35,90);
  else if(e.hours!=null){ var dur=rdNorm(e.hours,4,8), q=e.quality?rdNorm(e.quality,1,5):dur; sleep01=rdClamp(dur*0.6+q*0.4); }
  if(sleep01!=null) f.push({key:'sleep',label:'Sleep',v:sleep01,w:0.34});
  if(e.sleepScore!=null && e.hours!=null) f.push({key:'dur',label:'Sleep duration',v:rdNorm(e.hours,4,8),w:0.12});
  if(e.soreness) f.push({key:'sore',label:'Muscle freshness',v:rdNorm(6-e.soreness,1,5),w:0.16});
  if(e.energy) f.push({key:'energy',label:'Energy',v:rdNorm(e.energy,1,5),w:0.16});
  if(e.stress) f.push({key:'stress',label:'Low stress',v:rdNorm(6-e.stress,1,5),w:0.10});
  if(e.rhr && base.rhr) f.push({key:'rhr',label:'Resting HR',v:rdNorm(base.rhr+6-e.rhr,-8,12),w:0.12});
  if(e.hrv && base.hrv) f.push({key:'hrv',label:'HRV',v:rdNorm(e.hrv-base.hrv,-25,25),w:0.12});
  var sw=0,sv=0; f.forEach(function(x){sw+=x.w;sv+=x.v*x.w;});
  var score=sw?Math.round(100*sv/sw):0;
  var band=rdBand(score);
  return {score:score,band:band,label:band.label,color:band.color,advice:band.advice,cue:band.cue,factors:f};
}
function todayReadiness(){ var k=todayKey(); for(var i=S.readiness.length-1;i>=0;i--) if(S.readiness[i].date===k) return S.readiness[i]; return null; }
function gaugeBlock(score,color,sub,size){
  size=size||118; var r=size/2-9, c=2*Math.PI*r, cx=size/2, off=c*(1-rdClamp(score/100));
  var svg='<svg viewBox="0 0 '+size+' '+size+'" style="width:'+size+'px;height:'+size+'px;transform:rotate(-90deg)">'
    +'<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="var(--card2)" stroke-width="9"/>'
    +'<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="9" stroke-linecap="round" stroke-dasharray="'+c.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'"/></svg>';
  return '<div style="position:relative;width:'+size+'px;height:'+size+'px;flex:none">'+svg

function isDesktop(){ return window.matchMedia('(min-width:1080px)').matches; }
function weeklyVolume(n){
  var vals=[],labels=[],MABR=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],lastMon=-1;
  for(var i=n-1;i>=0;i--){
    var mStart=monday(new Date(Date.now()-i*7*86400000)),mEnd=new Date(mStart.getTime()+7*86400000),v=0;
    S.workouts.forEach(function(w){var d=new Date(w.start);if(d>=mStart&&d<mEnd)v+=w.volume;});
    vals.push(v);
    var lab=(i===0?'This wk':String(mStart.getDate()));
    if(i!==0&&mStart.getMonth()!==lastMon)lab=mStart.getDate()+' '+MABR[mStart.getMonth()];
    lastMon=mStart.getMonth(); labels.push(lab);
  }
  return {vals:vals,labels:labels};
}
function dashBars(d){

  }).join('')+'</div>';
}

function planDayName(p,i){ return p.short+' · D'+(i+1)+' '+p.days[i].s; }
function planDayExercises(p,i,withDone){
  return p.days[i].items.map(function(it){
    var def=exDef(it[0]), sets=[];
    for(var j=0;j<it[1];j++){
      var s={type:'N',weight:null,reps:def.type==='time'?null:it[2],time:def.type==='time'?it[2]:null};
      if(withDone)s.done=false;
      sets.push(s);
    }
    return {exId:it[0],note:it[3]||null,sets:sets};
  });
}
function planDetailHtml(pid){
  var p=planById(pid);
  if(!p)return backHeader('Plan not found')+'</div>';
  var h=backHeader(p.name)+'<div class="sub">'+p.days.length+'-day split · '+esc(p.tag)+(p.origin?' · '+esc(p.origin):'')+'</div>';
  h+='<button class="btn" onclick="addPlan(\''+p.id+'\')">+ Add all '+p.days.length+' days to My Routines</button>';
  p.days.forEach(function(d,i){
    h+='<div class="card"><b>Day '+(i+1)+' — '+esc(d.t)+'</b>';
    d.items.forEach(function(it){
      var def=exDef(it[0]);

      h+='<div class="planex"><b>'+it[1]+' × '+esc(def.name)+'</b><span style="flex:none">'+val+'</span></div>';
      if(it[3])h+='<div class="exnote" style="margin:0 0 6px 0">'+esc(it[3])+'</div>';
    });
    h+='<button class="btn small soft" style="margin-top:16px;width:100%" onclick="startPlanDay(\''+p.id+'\','+i+')">Start Day '+(i+1)+'</button></div>';
  });
  return h+'</div>';
}
function addPlan(pid){
  var p=planById(pid); if(!p)return;
  var added=0;
  p.days.forEach(function(d,i){
    var nm=planDayName(p,i);
    if(S.routines.some(function(r){return r.name===nm;}))return;
    S.routines.push({id:uid(),name:nm,exercises:planDayExercises(p,i,false)});
    added++;
  });
  save(); render();
  toast(added?added+' routine'+(added>1?'s':'')+' added':'Plan is already in your routines');
}
function startPlanDay(pid,i){
  var p=planById(pid); if(!p)return;
  startWorkout({name:planDayName(p,i),exercises:planDayExercises(p,i,true)});
}

function routineSetSummary(e){
  var def=exDef(e.exId), t=def.type, sets=e.sets||[];
  if(!sets.length)return 'No sets planned';
  function lbl(s){
    var pre=(s.type&&s.type!=='N')?s.type+' · ':'';
    if(t==='time')return pre+(s.time?fmtTime(s.time):'—');
    if(t==='reps')return pre+((s.reps!=null?s.reps:'—')+' reps');
    if(s.weight!=null)return pre+dispW(s.weight)+' '+S.unit+' × '+(s.reps!=null?s.reps:'—');
    if(s.reps!=null)return pre+s.reps+' reps';
    return pre+'—';
  }
  var labels=sets.map(lbl), same=labels.every(function(l){return l===labels[0];});
  var n=sets.length+' set'+(sets.length>1?'s':'');
  return same ? n+' · '+labels[0] : n+' · '+labels.join(', ');

function pearson(xs,ys){

  for(var i=0;i<n;i++){num+=(xs[i]-mx)*(ys[i]-my);den+=(xs[i]-mx)*(xs[i]-mx);}

  var dots=pairs.map(function(p){return '<circle cx="'+X(p.sleep).toFixed(1)+'" cy="'+Y(p.e1rm).toFixed(1)+'" r="4" fill="var(--acc)" opacity="0.85"/>';}).join('');

  ex.sets.push({type:'N',weight:lastN?lastN.weight:null,reps:lastN?lastN.reps:null,time:lastN?lastN.time:null,done:false});
  ctxRender(mode);
}

}
function cell(mode,i,j,f,el){
  var ex=ctxList(mode)[i]; if(!ex)return; var s=ex.sets[j]; if(!s)return;
  if(f==='weight')s.weight=toKg(el.value);
  else if(f==='reps'){var n=parseInt(el.value,10);s.reps=isNaN(n)?null:n;}
  else if(f==='time')s.time=parseTime(el.value);
  save();
}

      return '<button class="menuitem" onclick="applyType(\''+mode+'\','+i+','+j+',\''+o[0]+'\')"><span class="ic stype '+o[0]+'" style="height:auto">'+(o[2]||'1')+'</span>'+o[1]+'</button>';
    }).join('')+

function removeSet(mode,i,j){ closeSheet(); var ex=ctxList(mode)[i]; if(!ex)return; ex.sets.splice(j,1); ctxRender(mode); }
function toggleDone(i,j,btn){
  var ex=S.active&&S.active.exercises[i]; if(!ex)return; var s=ex.sets[j],def=exDef(ex.exId);
  if(s.done){ s.done=false; save(); renderOverlay(); return; }
  /* adopt placeholder (previous) values when empty */
  var prev=prevSets(ex.exId), p=prev&&prev[j]?prev[j]:null;
  if(def.type==='wr'){
    if(s.weight==null && p)s.weight=p.weight;
    if(s.reps==null && p)s.reps=p.reps;
    if(!s.reps){ flagBad(btn); return; }   /* validate BEFORE defaulting — no bad data persisted */
    if(s.weight==null)s.weight=0;
  } else if(def.type==='reps'){
    if(s.reps==null && p)s.reps=p.reps;
    if(!s.reps){ flagBad(btn); return; }
  } else {
    if(s.time==null && p)s.time=p.time;
    if(!s.time){ flagBad(btn); return; }
  }
  s.done=true; save(); renderOverlay();
  if(ex.ssNext){ var nx=S.active.exercises[i+1]; if(nx)toast('Superset — now do '+exDef(nx.exId).name); }   /* no rest between superset moves */
  else if(S.restDefault>0)startRest(S.restDefault);
}
function flagBad(btn){
  var row=btn.closest('.setrow'); if(!row)return;
  row.querySelectorAll('.nin').forEach(function(inp){ if(!inp.value){ inp.classList.add('bad'); setTimeout(function(){inp.classList.remove('bad');},600); } });
}

function loadSample(){
  var plans=[
    {name:'Push Day',list:[['bb-bench',60,8,4],['db-incline-press',22,10,3],['db-shoulder-press',18,10,3],['db-lateral-raise',8,12,3],['cable-pushdown',25,12,3]]},
    {name:'Pull Day',list:[['bb-deadlift',100,5,4],['lat-pulldown',55,10,3],['cable-row',50,10,3],['bb-curl',30,10,3],['cable-face-pull',20,15,3]]},
    {name:'Leg Day',list:[['bb-squat',80,8,4],['leg-press',140,10,3],['bb-rdl',70,10,3],['machine-leg-curl',40,12,3],['calf-raise-standing',60,12,3]]}
  ];
  var now=new Date();
  for(var wk=5;wk>=0;wk--){
    var grow=1+0.025*(5-wk);
    for(var p=0;p<plans.length;p++){
      var day=new Date(monday(new Date(now.getTime()-wk*7*86400000)));
      day.setDate(day.getDate()+p*2); day.setHours(18,0,0,0);
      if(day>now)continue;
      var end=new Date(day.getTime()+(50+Math.round(Math.random()*20))*60000);
      var wo={id:uid(),name:plans[p].name,start:day.toISOString(),end:end.toISOString(),exercises:[]};
      plans[p].list.forEach(function(it){
        var base=Math.round(it[1]*grow*2)/2, sets=[];
        for(var s2=0;s2<it[3];s2++){
          var warm=(s2===0&&it[3]>3);
          var rep=it[2]+(warm?4:Math.round(Math.random()*2-1));
          sets.push({type:warm?'W':'N',weight:warm?Math.round(base*0.6*2)/2:base,reps:Math.max(3,rep),time:null,done:true});
        }
        wo.exercises.push({exId:it[0],sets:sets});
      });
      finalizeWorkout(wo);
      S.workouts.push(wo);
      S.workouts.sort(function(a,b){return a.start<b.start?-1:1;});
    }
  }
  /* routines from plans at latest weights */
  plans.forEach(function(pl){
    S.routines.push({id:uid(),name:pl.name,exercises:pl.list.map(function(it){
      var base=Math.round(it[1]*1.1*2)/2, sets=[];
      for(var s2=0;s2<it[3];s2++){ var warm=(s2===0&&it[3]>3);
        sets.push({type:warm?'W':'N',weight:warm?Math.round(base*0.6*2)/2:base,reps:warm?it[2]+4:it[2],time:null}); }
      return {exId:it[0],sets:sets};
    })});
  });
  S.sampleDismissed=true; save(); render(); toast('Sample data loaded');
}

function nativeHealthSync(silent){
  if(!HealthKit){ if(!silent)toast('Apple Health needs the iOS app'); return; }
  var endDate=new Date().toISOString(), startDate=new Date(Date.now()-2*864e5).toISOString();
  function q(name){ return HealthKit.queryHKitSampleType({sampleName:name,startDate:startDate,endDate:endDate,limit:0}).then(function(r){return (r&&r.resultData)||[];}).catch(function(){return [];}); }

  });

function mapHealthKit(sleep,hrv,rhr){
  /* HealthKit returns raw samples (no sleep "score") — derive hours-asleep + latest HRV/RHR.
     Sample field names vary by plugin version; verify against device output and adjust. */
  var hours=null;
  if(sleep&&sleep.length){
    var ms=0;
    sleep.forEach(function(s){ var v=(''+(s.value!=null?s.value:s.sleepState!=null?s.sleepState:'')).toLowerCase(); if(v.indexOf('asleep')>-1||s.value===1){ var a=new Date(s.startDate),b=new Date(s.endDate); if(b>a)ms+=(b-a); } });
    if(ms>0)hours=Math.round(ms/36e5*10)/10;
  }
  function latest(arr){ return (arr&&arr.length)?arr[arr.length-1]:null; }
  var h=latest(hrv), rr=latest(rhr);
  return { date:todayKey(), hours:hours,
    hrv:(h&&h.value!=null)?Math.round(h.value):null,
    rhr:(rr&&rr.value!=null)?Math.round(rr.value):null,
    source:'apple' };
}

  if(S.wearable!=='demo'){ toast(wearableLabel(S.wearable)+' isn\'t available yet'); return; }
  var a=$('#ck-score');if(a)a.value=82;
  var b=$('#ck-rhr');if(b)b.value=52;
  var c=$('#ck-hrv');if(c)c.value=64;
  toast('Filled from '+wearableLabel(S.wearable));
}
function hashStr(s){var h=5381;for(var i=0;i<s.length;i++){h=((h<<5)+h+s.charCodeAt(i))|0;}return (h>>>0).toString(36);}
/* ---- first-run onboarding: goal → experience → days → auto-build a starter plan ---- */
var _ob={step:0,goal:null,level:null,days:null};
function _starterPick(muscle,used){
  var list=exAll().filter(function(e){return e.muscle===muscle && used.indexOf(e.id)<0;});
  var order={Barbell:0,Dumbbell:1,Machine:2,Cable:2,Bodyweight:3};
  list.sort(function(a,b){ return (order[a.equip]==null?4:order[a.equip])-(order[b.equip]==null?4:order[b.equip]); });
  return list[0]?list[0].id:null;
}
function buildStarterRoutines(goal,level,days){
  var sets=(goal==='Gain strength'&&level!=='Beginner')?4:3;
  var reps=goal==='Gain strength'?5:goal==='Lose fat'?12:goal==='Improve endurance'?15:10;
  function mkEx(m,used){ var id=_starterPick(m,used); if(!id)return null; used.push(id); var ss=[]; for(var k=0;k<sets;k++)ss.push({type:'N',weight:null,reps:reps,time:null,done:false}); return {exId:id,note:null,ssNext:false,sets:ss}; }
  function mk(name,muscles){ var used=[],exs=[]; muscles.forEach(function(m){ var e=mkEx(m,used); if(e)exs.push(e); }); return {id:uid(),name:name,exercises:exs}; }
  if(days>=5)return [mk('Push',['Chest','Chest','Shoulders','Triceps']),mk('Pull',['Back','Back','Biceps','Forearms']),mk('Legs',['Quadriceps','Hamstrings','Glutes','Calves'])];
  if(days===4)return [mk('Upper Body',['Chest','Back','Shoulders','Biceps','Triceps']),mk('Lower Body',['Quadriceps','Hamstrings','Glutes','Calves','Core'])];
  return [mk('Full Body',['Chest','Back','Quadriceps','Shoulders','Biceps','Core'])];
}
function renderOnboard(){ $('#screen').innerHTML=onboardHtml(); $('#screen').scrollTop=0; }
function obNext(){ _ob.step++; renderOnboard(); }
function obBack(){ if(_ob.step>0){_ob.step--; renderOnboard();} }
function obPick(field,val){ _ob[field]=val; if(_ob.step<3){ _ob.step++; renderOnboard(); } else obFinish(); }
function obSkip(){ S.onboarded=true; S._dirty=true; save(); tab='home'; render(); }
function obFinish(){
  if(_ob.goal)S.goal=_ob.goal; if(_ob.level)S.level=_ob.level; if(_ob.days)S.weekGoal=_ob.days;
  var rs=buildStarterRoutines(_ob.goal||'Build muscle',_ob.level||'Beginner',_ob.days||3);
  S.routines=rs.concat(S.routines||[]);
  S.onboarded=true; S._dirty=true; save(); tab='home'; stack=[]; render();
  toast('You\'re all set — your starter '+(rs.length>1?'routines are':'routine is')+' ready');
}
function obStep(title,field,opts){
  var h='<div class="h1" style="margin-top:5vh">'+title+'</div><div class="obopts">';
  opts.forEach(function(o){ var val=o[0], sel=_ob[field]===val, arg=(typeof val==='number')?val:('\''+val+'\'');
    h+='<div class="obopt'+(sel?' sel':'')+'" onclick="obPick(\''+field+'\','+arg+')">'+(o[1]?'<span class="qi">'+icon(o[1])+'</span>':'')+'<span class="grow"><b>'+esc(field==='days'?(val+' days a week'):String(val))+'</b>'+(o[2]?'<div class="sub" style="margin:2px 0 0">'+o[2]+'</div>':'')+'</span><span class="obcheck">'+icon('check')+'</span></div>'; });
  h+='</div><div class="authnote" style="cursor:pointer" onclick="obBack()">‹ Back</div>';
  return h;
}
function onboardHtml(){
  var s=_ob.step, h='<div class="scr" style="max-width:460px;margin:0 auto">';
  if(s>=1&&s<=3)h+='<div class="obprog">'+[1,2,3].map(function(n){return '<span class="'+(n<=s?'on':'')+'"></span>';}).join('')+'</div>';
  if(s===0){
    h+='<div style="text-align:center;margin-top:9vh"><div class="authlogo">'+brandSvg()+'</div>'+
      '<div class="authname">Welcome'+(S.name&&S.name!=='Athlete'?', '+esc(S.name.split(' ')[0]):'')+'</div>'+
      '<div class="authtag" style="margin-top:10px">Primed isn\'t just a logger — it reads your recovery and tells you how hard to train today. Let\'s build your plan in 30 seconds.</div>'+
      '<button class="btn" style="margin-top:30px" onclick="obNext()">Get started</button>'+
      '<div class="authnote" style="cursor:pointer" onclick="obSkip()">Skip for now</div></div>';
  } else if(s===1){
    h+=obStep('What\'s your main goal?','goal',[['Build muscle','dumb'],['Gain strength','up'],['Lose fat','pulse'],['General fitness','spark2']]);
  } else if(s===2){
    h+=obStep('How experienced are you?','level',[['Beginner','',"New to lifting or back after a long break"],['Intermediate','',"Training consistently for 6+ months"],['Advanced','',"Years of structured training"]]);
  } else if(s===3){
    h+=obStep('How many days a week can you train?','days',[[3,''],[4,''],[5,'']]);
  }
  return h+'</div>';
}
function authHtml(){
  if(authMode===null)authMode=S.account?'in':'up';
  var up=authMode==='up';
  var h='<div class="auth"><div class="authcard">';
  h+='<div class="authlogo">'+brandSvg()+'</div>';
  h+='<div class="authname">Primed</div>';
  h+='<div class="authtag">'+(up?'Create your account and start training.':'Welcome back — sign in to continue.')+'</div>';
  h+='<div class="authtoggle"><button class="'+(up?'':'on')+'" onclick="setAuthMode(\'in\')">Sign in</button><button class="'+(up?'on':'')+'" onclick="setAuthMode(\'up\')">Create account</button></div>';
  if(up)h+='<label class="f">Name</label><input class="tin" id="au-name" autocomplete="name" placeholder="Your name" value="'+esc((S.account&&S.account.name)||'')+'">';
  h+='<label class="f">Email</label><input class="tin" id="au-email" type="email" inputmode="email" autocomplete="email" placeholder="you@email.com" value="'+esc((S.account&&S.account.email)||'')+'">';
  h+='<label class="f">Password</label><input class="tin" id="au-pass" type="password" autocomplete="'+(up?'new-password':'current-password')+'" placeholder="'+(up?'Choose a password':'Your password')+'" onkeydown="if(event.key===\'Enter\')'+(up?'doSignUp()':'doSignIn()')+'">';
  h+='<div id="autherr" class="autherr"></div>';
  h+='<button class="btn" style="margin-top:8px" onclick="'+(up?'doSignUp()':'doSignIn()')+'">'+(up?'Create account':'Sign in')+'</button>';
  h+='<div class="authnote">'+(up?'14 days free — no card needed.':'New here? Create an account to start your 14-day free trial.')+'</div>';
  return h+'</div></div>';
}
function setAuthMode(m){ authMode=m; $('#screen').innerHTML=authHtml(); }
function authError(msg){ var e=$('#autherr'); if(e){e.textContent=msg;e.style.color='';e.classList.add('show');} var p=$('#au-pass'); if(p){p.classList.add('bad');setTimeout(function(){p.classList.remove('bad');},500);} }
function authNotice(msg){ var e=$('#autherr'); if(e){e.textContent=msg;e.style.color='var(--green)';e.classList.add('show');} }
function authBusy(b){ var btn=document.querySelector('.authcard .btn'); if(btn){btn.disabled=b;btn.style.opacity=b?'.6':'';btn.textContent=b?'Please wait…':(authMode==='up'?'Create account':'Sign in');} }
function authOffline(){ authBusy(false); var e=$('#autherr'); if(e){e.textContent='Couldn’t reach the server — check your connection and try again.';e.style.color='';e.classList.add('show');} }
function doSignUp(){
  var name=($('#au-name').value||'').trim(),email=($('#au-email').value||'').trim().toLowerCase(),pass=$('#au-pass').value||'';
  if(name.length<1)return authError('Please enter your name');
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email))return authError('Enter a valid email address');
  if(pass.length<6)return authError('Password needs at least 6 characters');
  if(!hasCloud())return authError('No connection to the server — try again.');
  authBusy(true);
  SB.auth.signUp({email:email,password:pass,options:{data:{name:name}}}).then(function(res){
    if(res.error){ authBusy(false); return authError(res.error.message); }
    if(!res.data.session){ authBusy(false); return authNotice('Account created — check your email to confirm, then come back and sign in.'); }
    S._uid=res.data.user.id; S.account={name:name,email:email}; S.name=name; S.signedIn=true; S.trialStart=new Date().toISOString(); S.feedbackGiven=false; S.purchased=false; authMode=null; S._dirty=true; persist(); render(); toast('Welcome to Primed, '+name.split(' ')[0]); pushSync();
  }).catch(function(){ authBusy(false); authOffline(); });
}
function doSignIn(){
  var email=($('#au-email').value||'').trim().toLowerCase(),pass=$('#au-pass').value||'';
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email))return authError('Enter a valid email address');
  if(!hasCloud())return authError('No connection to the server — try again.');
  authBusy(true);
  SB.auth.signInWithPassword({email:email,password:pass}).then(function(res){
    if(res.error){ authBusy(false); return authError(/confirm/i.test(res.error.message)?'Confirm your email first, then sign in.':'Wrong email or password'); }
    var user=res.data.user;
    S._uid=user.id; S.account={name:(user.user_metadata&&user.user_metadata.name)||S.name,email:user.email}; S.name=S.account.name||S.name; S.signedIn=true; authMode=null;
    SB.from('profiles').select('state,state_updated_at').eq('id',user.id).maybeSingle().then(function(r){
      var row=r.data;
      if(row&&row.state){ applyState(row.state); S.stateUpdatedAt=row.state_updated_at||0; S._dirty=false; persist(); }
      else { S._dirty=true; persist(); pushSync(); }
      ensureTrialStarted(); refreshBonus();
      render(); toast('Welcome back'+(S.name?', '+S.name.split(' ')[0]:''));
    });
  }).catch(function(){ authBusy(false); authOffline(); });
}
function goCreateAccount(){ S.signedIn=false; authMode='up'; stack=[]; tab='home'; woOpen=false; save(); render(); }
function signOut(){ closeSheet(); confirmSheet('Sign out? Your data stays in your account and on this device.',function(){ if(SB)SB.auth.signOut(); S.signedIn=false; S._uid=null; S._dirty=false; authMode=S.account?'in':'up'; stack=[]; tab='home'; woOpen=false; save(); render(); },'Sign out'); }
function render(){
  document.documentElement.dataset.theme=S.theme;
  var tcm=document.querySelector('meta[name=theme-color]'); if(tcm)tcm.setAttribute('content',S.theme==='light'?'#f7f4f0':'#0a0c08');
  var appEl=document.getElementById('app');
  if(!S.signedIn){ appEl.classList.add('authing'); $('#screen').innerHTML=authHtml(); $('#screen').scrollTop=0; return; }
  if(!S.onboarded){ appEl.classList.add('authing'); $('#screen').innerHTML=onboardHtml(); $('#screen').scrollTop=0; return; }
  appEl.classList.remove('authing');
  var top=stack.length?stack[stack.length-1]:null, html='';
  if(top){
    if(top.s==='exDetail')html=exDetailHtml(top.p);
    else if(top.s==='woDetail')html=woDetailHtml(top.p);
    else if(top.s==='routineEdit')html=routineEditHtml();
    else if(top.s==='planDetail')html=planDetailHtml(top.p);
    else if(top.s==='settings')html=settingsHtml();
    else if(top.s==='readiness')html=readinessDetailHtml();
  } else {
    html= tab==='home'?homeHtml() : tab==='workout'?workoutTabHtml() : tab==='exercises'?exercisesHtml() : tab==='history'?historyHtml() : profileHtml();
  }
  $('#screen').innerHTML=html;
  $('#tabbar').innerHTML=tabbarHtml();
  $('#tabbar').classList.toggle('navhide',!!top);
  renderBanner(); renderOverlay(); renderRest();
}
function renderBanner(){
  var b=$('#banner');
  if(S.active&&!woOpen){
    b.style.display='flex';
    b.innerHTML=icon('play')+'<div class="grow"><b id="bannerclock">'+fmtClock((Date.now()-new Date(S.active.start))/1000)+'</b> — '+esc(S.active.name)+'</div><span style="font-weight:800">Resume</span>';
    b.onclick=resumeWorkout;
  } else b.style.display='none';
}
function renderOverlay(){
  var o=$('#overlay');
  var pb=o.querySelector('.ovbody'), sy=pb?pb.scrollTop:0;   /* keep scroll position across re-render */
  if(S.active&&woOpen){ o.innerHTML=overlayHtml(); o.classList.add('open'); var nb=o.querySelector('.ovbody'); if(nb)nb.scrollTop=sy; }
  else { o.classList.remove('open'); if(!S.active)o.innerHTML=''; }
  renderBanner();
}

/* in-session gestures: swipe a set left to delete · drag the grip to reorder exercises */
(function(){
  var sw=null, dr=null;
  function ovEl(){ return document.getElementById('overlay'); }
  function closeSwipes(except){
    var o=ovEl(); if(!o)return;
    o.querySelectorAll('.setwrap.open').forEach(function(w){ if(w!==except){ w.classList.remove('open'); var r=w.querySelector('.setrow'); if(r)r.style.transform=''; } });
  }
  function down(e){
    if(!woOpen||!S.active)return;
    var grip=e.target.closest&&e.target.closest('.exgrip');
    if(grip){ startDrag(e,grip); return; }
    var wrap=e.target.closest&&e.target.closest('.setwrap');
    if(wrap&&ovEl()&&ovEl().contains(wrap)) sw={wrap:wrap,row:wrap.querySelector('.setrow'),x0:e.clientX,y0:e.clientY,lock:0,cur:0};
  }
  function move(e){
    if(dr){ dragMove(e); return; }
    if(!sw)return;
    var dx=e.clientX-sw.x0, dy=e.clientY-sw.y0;
    if(!sw.lock){
      if(Math.abs(dx)<6&&Math.abs(dy)<6)return;
      sw.lock=Math.abs(dx)>Math.abs(dy)?'x':'y';
      if(sw.lock!=='x'){ sw=null; return; }
      closeSwipes(sw.wrap);
    }
    e.preventDefault();
    var base=sw.wrap.classList.contains('open')?-64:0;
    sw.cur=Math.max(-78,Math.min(0,base+dx));
    sw.row.style.transition='none';
    sw.row.style.transform='translateX('+sw.cur+'px)';
  }
  function up(){
    if(dr){ dragEnd(); return; }
    if(!sw)return;
    if(sw.lock==='x'){
      sw.row.style.transition='';
      if(sw.cur<-32) sw.wrap.classList.add('open'); else sw.wrap.classList.remove('open');
      sw.row.style.transform='';
    }
    sw=null;
  }
  function startDrag(e,grip){
    var block=grip.closest('.exblock'), list=block&&block.parentNode;
    if(!block||!list)return;
    var oldTop=block.getBoundingClientRect().top;
    dr={block:block,list:list,body:block.closest('.ovbody'),y0:e.clientY,oldIndex:[].slice.call(list.querySelectorAll('.exblock')).indexOf(block)};
    dr.line=document.createElement('div'); dr.line.className='dropline';
    block.classList.add('dragging'); list.classList.add('reordering'); closeSwipes(null);
    dr.y0=e.clientY-(oldTop-block.getBoundingClientRect().top);   /* keep the row under the finger after collapse */
    e.preventDefault();
  }
  function dragMove(e){
    e.preventDefault();
    dr.block.style.transform='translateY('+(e.clientY-dr.y0)+'px)';
    if(dr.body){ var br=dr.body.getBoundingClientRect(), edge=72;   /* auto-scroll near the edges */
      if(e.clientY<br.top+edge)dr.body.scrollTop-=14; else if(e.clientY>br.bottom-edge)dr.body.scrollTop+=14; }
    var py=e.clientY, placed=false, blocks=dr.list.querySelectorAll('.exblock');
    for(var k=0;k<blocks.length;k++){ var b=blocks[k]; if(b===dr.block)continue;
      var r=b.getBoundingClientRect();
      if(py<r.top+r.height/2){ dr.list.insertBefore(dr.line,b); placed=true; break; } }
    if(!placed)dr.list.appendChild(dr.line);
  }
  function dragEnd(){
    var newI=0, kids=dr.list.children;
    for(var k=0;k<kids.length;k++){ if(kids[k]===dr.line)break; if(kids[k].classList&&kids[k].classList.contains('exblock')&&kids[k]!==dr.block)newI++; }
    dr.block.classList.remove('dragging'); dr.block.style.transform='';
    if(dr.line.parentNode)dr.line.parentNode.removeChild(dr.line);
    var oldI=dr.oldIndex, list=S.active&&S.active.exercises;
    if(list&&newI!==oldI&&list[oldI]){
      if(list[oldI-1])list[oldI-1].ssNext=false; list[oldI].ssNext=false;   /* break superset links around a moved exercise */
      var it=list.splice(oldI,1)[0]; list.splice(newI,0,it); save();
    }
    dr=null; renderOverlay();
  }
  function cancel(){
    if(sw&&sw.row){ sw.row.style.transition=''; sw.row.style.transform=''; } sw=null;
    if(dr){ dr.block.classList.remove('dragging'); dr.block.style.transform=''; if(dr.line.parentNode)dr.line.parentNode.removeChild(dr.line); dr=null; renderOverlay(); }
  }
  document.addEventListener('pointerdown',down,{passive:true});
  document.addEventListener('pointermove',move,{passive:false});
  document.addEventListener('pointerup',up,{passive:true});
  document.addEventListener('pointercancel',cancel,{passive:true});
})();

/* edge swipe → back (subscreens, sheets, minimize workout) */
(function(){
  var sx=0,sy=0,edge=false;
  document.addEventListener('touchstart',function(e){
    var t=e.touches[0]; sx=t.clientX; sy=t.clientY; edge=sx<32;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!edge)return;
    var t=e.changedTouches[0], dx=t.clientX-sx, dy=Math.abs(t.clientY-sy);
    if(dx>70&&dy<60){
      if(document.querySelector('#modal').classList.contains('open'))closeSheet();
      else if(S.active&&woOpen)woMinimize();
      else if(stack.length)back();
    }
  },{passive:true});
})();

/* ticking */
setInterval(function(){
  if(S.active){
    var t=fmtClock((Date.now()-new Date(S.active.start))/1000);
    var c=$('#woclock'); if(c)c.textContent=t;
    var bc=$('#bannerclock'); if(bc)bc.textContent=t;
    var hc=$('#homeclock'); if(hc)hc.textContent=t;
    /* web: push a phone notification when a workout passes the forget threshold (native uses its scheduled one) */
    if(notifyEnabled()&&!LocalNotifs&&!_forgotFired&&(Date.now()-new Date(S.active.start).getTime())>=FORGOT_HOURS*3600000){
      _forgotFired=true; notify('Still training?','“'+(S.active.name||'Your workout')+'” has been running over '+FORGOT_HOURS+'h — open Primed to finish & save it.');
    }
  }
  if(rest.on){
    rest.left--;
    if(rest.left<=0){ rest.on=false; cancelRestReminder(); beep(); toast('Rest done — next set'); }
    renderRest();
  }
},1000);

/* switch between mobile and desktop layouts when crossing the breakpoint */
(function(){var wd=isDesktop();window.addEventListener('resize',function(){var d=isDesktop();if(d!==wd){wd=d;render();}});})();

render();
ensureTrialStarted();    /* start the 14-day trial clock for signed-in users who don't have one yet */
syncOnLaunch();
nativeInitPurchases();   /* RevenueCat lifetime entitlement → S.purchased (no-op on web) */
checkStaleWorkout();     /* ask if a workout was left running */
document.addEventListener('visibilitychange',function(){
  if(document.hidden){ _staleAsked=false; } else { checkStaleWorkout(); }
});
